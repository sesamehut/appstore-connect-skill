name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      # Surface platform-specific failures instead of masking them behind the
      # first cancelled job.
      fail-fast: false
      matrix:
        # Node-version risk and OS risk are independent axes: cover both Node
        # lines once on the cheapest runner, then one primary-Node job per
        # extra OS (macOS = ASC users' platform, Windows = dev machine).
        os: [ubuntu-latest]
        node: [22, 24]
        include:
          - os: windows-latest
            node: 24
          - os: macos-latest
            node: 24
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check
